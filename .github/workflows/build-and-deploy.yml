name: Build and Deploy WordPress Theme

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: 'Build Theme'
    runs-on: ubuntu-latest

    outputs:
      version:  ${{ steps.meta.outputs.version }}
      zip_name: ${{ steps.meta.outputs.zip_name }}
      zip_path: ${{ steps.meta.outputs.zip_path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from style.css
        id: meta
        shell: bash
        run: |
          RAW=$(grep -m1 -E '^[[:space:]]*\*?[[:space:]]*Version[[:space:]]*:' style.css \
            | sed -E 's/.*Version[[:space:]]*:[[:space:]]*//' \
            | tr -d '[:space:]')

          if [[ -z "$RAW" ]]; then
            echo "::error::Could not find 'Version:' in style.css"
            exit 1
          fi

          ZIP_NAME="tutorstarter-${RAW}.zip"
          ZIP_PATH="${GITHUB_WORKSPACE}/${ZIP_NAME}"

          echo "version=${RAW}" >> "$GITHUB_OUTPUT"
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "zip_path=${ZIP_PATH}" >> "$GITHUB_OUTPUT"

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer:v2
          coverage: none

      - name: Install WP-CLI
        run: |
          composer global require wp-cli/wp-cli-bundle
          wp --version --allow-root

      - name: Install dist-archive command
        run: |
          composer global require wp-cli/dist-archive-command:^3.0
          echo "$HOME/.composer/vendor/bin" >> $GITHUB_PATH

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup minimal WordPress
        run: |
          mkdir -p /tmp/wp
          cd /tmp/wp

          wp core download --allow-root
          wp config create \
            --dbname=wp \
            --dbuser=root \
            --dbpass=root \
            --dbhost=127.0.0.1 \
            --skip-check \
            --allow-root

      - name: Build assets
        run: |
          npm run production
          composer install --no-dev
          wp i18n make-pot --exclude='node_modules,vendor' . languages/tutorstarter.pot \
          --path=/tmp/wp \
          --allow-root
        
        env:
          NODE_ENV: production
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Build theme zip
        run: |
          wp dist-archive . "${{ steps.meta.outputs.zip_path }}" --allow-root

      - name: Verify zip
        run: |
          if [[ ! -f "${{ steps.meta.outputs.zip_path }}" ]]; then
            echo "::error::Zip not found"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: theme-zip
          path: ${{ steps.meta.outputs.zip_path }}
          retention-days: 1

  deploy-wporg:
    name: 'Deploy to WordPress.org'
    runs-on: ubuntu-latest
    needs: build
    if: ${{ false }}

    env:
      THEME_SLUG: tutorstarter
      THEME_VERSION: ${{ needs.build.outputs.version }}
      ZIP_NAME: ${{ needs.build.outputs.zip_name }}
      SVN_BASE: https://themes.svn.wordpress.org

    steps:
      - name: Install Subversion
        run: |
          sudo apt-get update -q
          sudo apt-get install -y subversion

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: theme-zip
          path: /tmp/build

      - name: Checkout SVN trunk
        run: |
          SVN_URL="${SVN_BASE}/${THEME_SLUG}"
          svn checkout --depth immediates \
            --username "${{ secrets.SVN_USERNAME }}" \
            --password "${{ secrets.SVN_PASSWORD }}" \
            --no-auth-cache --non-interactive \
            "${SVN_URL}" /tmp/svn

          svn update /tmp/svn/trunk --set-depth infinity \
            --username "${{ secrets.SVN_USERNAME }}" \
            --password "${{ secrets.SVN_PASSWORD }}" \
            --no-auth-cache --non-interactive

      - name: Unzip theme
        run: |
          mkdir -p /tmp/theme-files
          unzip -q "/tmp/build/${ZIP_NAME}" -d /tmp/theme-files

      - name: Sync files to SVN trunk
        run: |
          TRUNK=/tmp/svn/trunk
          find "$TRUNK" -mindepth 1 -delete
          cp -r /tmp/theme-files/. "$TRUNK/"

          svn status "$TRUNK" | grep '^?' | awk '{print $2}' | xargs -r svn add --force
          svn status "$TRUNK" | grep '^!' | awk '{print $2}' | xargs -r svn delete

      - name: Commit to SVN
        run: |
          svn commit /tmp/svn/trunk \
            --username "${{ secrets.SVN_USERNAME }}" \
            --password "${{ secrets.SVN_PASSWORD }}" \
            --no-auth-cache --non-interactive \
            -m "Deploy version ${THEME_VERSION}"

      - name: Create SVN tag
        run: |
          svn copy "${SVN_BASE}/${THEME_SLUG}/trunk" "${SVN_BASE}/${THEME_SLUG}/tags/${THEME_VERSION}" \
            --username "${{ secrets.SVN_USERNAME }}" \
            --password "${{ secrets.SVN_PASSWORD }}" \
            --no-auth-cache --non-interactive \
            -m "Tag version ${THEME_VERSION}"

  release:
    name: 'Create GitHub Release'
    runs-on: ubuntu-latest
    needs: build
    if: always() && needs.build.result == 'success'

    env:
      VERSION: ${{ needs.build.outputs.version }}
      ZIP_NAME: ${{ needs.build.outputs.zip_name }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: theme-zip
          path: /tmp/release

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${VERSION}"
          gh release create "$TAG" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "TutorStarter ${VERSION}" \
            "/tmp/release/${ZIP_NAME}" \
          || gh release upload "$TAG" "/tmp/release/${ZIP_NAME}" --repo "${GITHUB_REPOSITORY}" --clobber
